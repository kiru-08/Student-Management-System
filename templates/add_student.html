{% extends 'base.html' %}

{% block content %}

<div class="page-header mb-4">
    <h2>🎓 Student Registration</h2>
    <p class="text-muted">Add a new student to the Student Management System</p>
</div>

<div class="card-box">

<form action="/save_student" method="POST">

<!-- ================= Student Information ================= -->

<h4 class="section-title">👤 Student Information</h4>

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">
        First Name <span class="text-danger">*</span>
        </label>
        <input type="text" name="first_name" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">
        Last Name <span class="text-danger">*</span>
        </label>
        <input type="text" name="last_name" class="form-control" required   >
    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">
        Gender <span class="text-danger">*</span>
        </label>
        <select name="gender" class="form-select">

            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>

        </select>

    </div>

    <div class="col-md-6 mb-3">
        
        <label class="form-label">
        Roll Number <span class="text-danger">*</span>
        </label>
        <input type="text" name="roll_no" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        
        <label class="form-label">
        Date of Birth <span class="text-danger">*</span>
        </label>
        <input type="date" name="dob" class="form-control">
    </div>

</div>

<hr>

<!-- ================= Academic ================= -->

<h4 class="section-title">🎓 Academic Information</h4>

<div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">
        Department <span class="text-danger">*</span>
        </label>

        <select name="department" class="form-select">

            <option value="">Select Department</option>

            <option>Computer Engineering</option>
            <option>Information Technology</option>
            <option>Electronics Engineering</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
            <option>Electrical Engineering</option>

        </select>

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">
        Year <span class="text-danger">*</span>
        </label>
        <select name="year" class="form-select">

            <option>First Year</option>
            <option>Second Year</option>
            <option>Third Year</option>
            <option>Final Year</option>

        </select>

    </div>

    <div class="col-md-6 mb-3">
        
        <label class="form-label">
        Admission Date <span class="text-danger">*</span>
        </label>
        <input type="date" name="admission_date" class="form-control">
    </div>

</div>

<hr>

<!-- ================= Contact ================= -->

<h4 class="section-title">📞 Contact Information</h4>

<div class="row">

    <div class="col-md-6 mb-3">
        
        <label class="form-label">
        Mobile Number <span class="text-danger">*</span>
        </label>
        <input type="tel"
               name="mobile"
               class="form-control"
               maxlength="10"
               required>
    </div>

    <div class="col-md-6 mb-3">
        
        <label class="form-label">
        Email Address <span class="text-danger">*</span>
        </label>
        <input type="email" name="email" class="form-control">
    </div>

    <div class="col-md-12 mb-3">
        <label class="form-label">Address</label>
        <textarea name="address" rows="3" class="form-control"></textarea>
    </div>

</div>

<hr>

<!-- ================= Parent ================= -->

<h4 class="section-title">👨‍👩‍👧 Parent Information</h4>

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">Parent Name</label>
        <input type="text" name="parent_name" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Parent Mobile</label>
        <input type="tel"
               name="parent_mobile"
               maxlength="10"
               class="form-control">
    </div>

</div>

<div class="text-center mt-4">

    <button class="btn btn-success btn-lg px-5">

        💾 Save Student

    </button>

    <button type="reset"
            class="btn btn-warning btn-lg px-5 ms-2">

        🔄 Reset

    </button>

    <a href="/students"
       class="btn btn-secondary btn-lg px-5 ms-2">

        ← Back

    </a>

</div>

</form>

</div>

{% endblock %}
