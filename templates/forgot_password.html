{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card shadow p-4 mx-auto" style="max-width:500px;">

<h2 class="text-center mb-4">🔑 Forgot Password</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">Login As</label>

<div class="d-flex gap-4">

<div class="form-check">

<input class="form-check-input"
type="radio"
name="role"
value="admin"
checked>

<label class="form-check-label">
Admin
</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="role"
value="teacher">

<label class="form-check-label">
Teacher
</label>

</div>

</div>

</div>

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>New Password</label>

<input
type="password"
name="new_password"
class="form-control"
required>

</div>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<button class="btn btn-success w-100">

Update Password

</button>

<div class="text-center mt-3">

<a href="/">Back to Login</a>

</div>

</form>

</div>

</div>

{% endblock %}
